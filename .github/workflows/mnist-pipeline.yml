name: MNIST Classification Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov torchinfo
        pip install -r requirements.txt
    
    - name: Check model architecture
      run: |
        pytest tests/test_model.py::test_parameter_count tests/test_model.py::test_input_output_shape -v
    
    - name: Train model
      run: |
        python train.py
        
    - name: Test trained model
      run: |
        pytest tests/test_model.py::test_accuracy tests/test_model.py::test_model_forward -v
    
    - name: Save best model and results
      uses: actions/upload-artifact@v4
      with:
        name: mnist-model
        path: |
          mnist_model_best_*.pth
          training_history.json
        retention-days: 5

    - name: Update README with latest results
      run: |
        python src/update_readme.py
